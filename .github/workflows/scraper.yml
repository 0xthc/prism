name: Prism Scraper

on:
  schedule:
    - cron: '0 * * * *'     # brand signals + fund raises — every hour
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run brand + fund scraper
        env:
          SUPABASE_URL: ${{ secrets.PRISM_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.PRISM_SUPABASE_SERVICE_KEY }}
        run: python backend/scraper.py

      - name: Run trends scraper
        env:
          SUPABASE_URL: ${{ secrets.PRISM_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.PRISM_SUPABASE_SERVICE_KEY }}
        run: python backend/trends_scraper.py

      - name: Run precognition scraper
        env:
          SUPABASE_URL: ${{ secrets.PRISM_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.PRISM_SUPABASE_SERVICE_KEY }}
        run: python backend/precognition_scraper.py
